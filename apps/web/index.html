<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#123322" />
    <meta
      name="description"
      content="Samagra Krishi (IFM) — integrated farm management for Indian farms: livestock batches, daily logging, health and vaccination schedules, feed, finance with GST/FSSAI invoicing, sales, cold chain and market intelligence."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Samagra Krishi — IFM</title>
    <script>
      // Apply the saved (or OS-preferred) theme before first paint to avoid a flash.
      (function () {
        try {
          var s = localStorage.getItem('ifm.theme');
          var dark = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <!-- Fonts are self-hosted via @fontsource (imported in src/main.tsx) — no CDN requests. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
