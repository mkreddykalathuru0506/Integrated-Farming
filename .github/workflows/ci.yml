name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ifm
          POSTGRES_PASSWORD: ifm_dev_password
          POSTGRES_DB: ifm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ifm -d ifm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ifm:ifm_dev_password@localhost:5432/ifm_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_not_for_prod

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations (test DB)
        run: pnpm --filter @ifm/api exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Brief §11 gate: ≥80% lines on the pure domain-logic modules. Re-runs
      # only the 13 pure unit-test files with v8 instrumentation (~4s).
      - name: Domain-logic coverage gate (api)
        run: pnpm --filter @ifm/api test:coverage

      - name: Build
        run: pnpm build
