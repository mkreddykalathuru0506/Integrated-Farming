name: E2E (Playwright)

# Runs on every PR + on demand. Deliberately a SEPARATE, non-required workflow
# (informational): browser runs can be flaky and must not block merges — the
# gating `CI` workflow stays fast. The Playwright webServer config boots the
# api (:4100, NODE_ENV=test) and web (:5190) itself; this job only prepares
# the database and browsers.
on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ifm
          POSTGRES_PASSWORD: ifm_dev_password
          POSTGRES_DB: ifm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ifm -d ifm_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ifm:ifm_dev_password@localhost:5432/ifm_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_not_for_prod
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @ifm/api exec prisma migrate deploy
      - run: pnpm --filter @ifm/api exec tsx prisma/seed.ts
      - name: Install Playwright browser
        run: pnpm --filter @ifm/web exec playwright install --with-deps chromium
      - name: Run e2e (webServer starts api + web)
        run: pnpm --filter @ifm/web e2e
