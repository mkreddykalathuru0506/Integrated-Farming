# Local infra for development: Postgres + Redis.
# (API + web run via `pnpm dev` for hot reload; full container images land in slice 0.6.)
services:
  postgres:
    image: postgres:16-alpine
    container_name: ifm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ifm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ifm_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ifm}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ifm} -d ${POSTGRES_DB:-ifm}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ifm-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
